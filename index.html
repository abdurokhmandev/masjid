<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masjidgacha – Qibla Yo'nalishi</title>
  <meta name="description" content="Qibla yo'nalishini aniqlash va professional dizayn" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1 class="title">Qibla Yo'nalishini Aniqlash</h1>
    <p class="subtitle">Geolokatsiya orqali Kaaba (Makkah) tomoniga yo'nalishni ko'rsatuvchi kompas</p>
    <div class="compass-card">
      <div class="compass">
        <img src="https://i.imgur.com/6kQbT4R.png" alt="Compass background" class="compass-bg" />
        <img src="https://i.imgur.com/8Qz9Jcx.png" alt="Arrow" id="arrow" class="compass-arrow" />
      </div>
      <div id="status" class="status">Joylashuvingizni aniqlash uchun "Qidir" tugmasini bosing</div>
      <button id="locateBtn" class="btn-primary">Qidir</button>
    </div>
    <footer class="footer">
      <p>© 2026 Masjidgacha – All rights reserved.</p>
    </footer>
  </main>
  <script src="script.js"></script>
</body>
</html>
